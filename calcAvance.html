<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice Scientifique</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: white;
            /* Image background might be white, let's keep centered layout but ensure no ugly margins */
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .calculator {
            /* Flat minimal box like the image */
            background-color: white;
            border: 1px solid #ccc;
            width: 550px;
        }

        .display-container {
            padding: 15px;
            border-bottom: 1px solid #ccc;
            background-color: white;
        }

        #display {
            width: 100%;
            height: 55px;
            font-size: 24px;
            text-align: right;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #e8eaeb;
            /* Match the display background color exactly */
            outline: none;
            color: #333;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        .cell {
            border-bottom: 1px solid #ccc;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px 10px;
        }

        /* Remove bottom border from the last row */
        .cell:nth-child(n+29) {
            border-bottom: none;
        }

        /* Add vertical dividing lines */
        .cell:nth-child(7n+3),
        .cell:nth-child(7n+6) {
            border-right: 1px solid #ccc;
        }

        /* Grey buttons */
        .grey-btn {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #9f9f9f;
            color: #111;
            border-radius: 3px;
            font-size: 18px;
            cursor: pointer;
        }

        .grey-btn:hover {
            background-color: #8c8c8c;
        }

        /* Default buttons with transparent background */
        .num-btn {
            width: 100%;
            height: 100%;
            border: none;
            background-color: transparent;
            color: #111;
            font-size: 20px;
            cursor: pointer;
        }

        .num-btn:hover {
            background-color: #f0f0f0;
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <div class="calculator">
        <div class="display-container">
            <input type="text" id="display" readonly>
        </div>
        <div class="buttons">
            <!-- row 1 -->
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"><button class="grey-btn" onclick="addToDisplay('(')">(</button></div>
            <div class="cell"><button class="grey-btn" onclick="addToDisplay(')')">)</button></div>
            <div class="cell"><button class="grey-btn" onclick="addToDisplay('%')">%</button></div>
            <div class="cell"><button class="grey-btn" onclick="clearDisplay()">CE</button></div>

            <!-- row 2 -->
            <div class="cell"><button class="grey-btn" onclick="addToDisplay('1/(')">Inv</button></div>
            <div class="cell"><button class="grey-btn" onclick="addToDisplay('sin(')">sin</button></div>
            <div class="cell"><button class="grey-btn" onclick="addToDisplay('ln(')">ln</button></div>
            <div class="cell"><button class="num-btn" onclick="addToDisplay('7')">7</button></div>
            <div class="cell"><button class="num-btn" onclick="addToDisplay('8')">8</button></div>
            <div class="cell"><button class="num-btn" onclick="addToDisplay('9')">9</button></div>
            <div class="cell"><button class="grey-btn" onclick="addToDisplay('÷')">÷</button></div>

            <!-- row 3 -->
            <div class="cell"><button class="grey-btn" onclick="addToDisplay('π')">π</button></div>
            <div class="cell"><button class="grey-btn" onclick="addToDisplay('cos(')">cos</button></div>
            <div class="cell"><button class="grey-btn" onclick="addToDisplay('log(')">log</button></div>
            <div class="cell"><button class="num-btn" onclick="addToDisplay('4')">4</button></div>
            <div class="cell"><button class="num-btn" onclick="addToDisplay('5')">5</button></div>
            <div class="cell"><button class="num-btn" onclick="addToDisplay('6')">6</button></div>
            <div class="cell"><button class="grey-btn" onclick="addToDisplay('×')">×</button></div>

            <!-- row 4 -->
            <div class="cell"><button class="grey-btn" onclick="addToDisplay('e')">e</button></div>
            <div class="cell"><button class="grey-btn" onclick="addToDisplay('tan(')">tan</button></div>
            <div class="cell"><button class="grey-btn" onclick="addToDisplay('sqrt(')">√</button></div>
            <div class="cell"><button class="num-btn" onclick="addToDisplay('3')">3</button></div>
            <div class="cell"><button class="num-btn" onclick="addToDisplay('2')">2</button></div>
            <div class="cell"><button class="num-btn" onclick="addToDisplay('1')">1</button></div>
            <div class="cell"><button class="grey-btn" onclick="addToDisplay('-')">-</button></div>

            <!-- row 5 -->
            <div class="cell"><button class="grey-btn" onclick="addToDisplay('exp(')">EXP</button></div>
            <div class="cell"><button class="grey-btn" onclick="addToDisplay('²')">x²</button></div>
            <div class="cell"><button class="grey-btn" onclick="addToDisplay('^')">x^</button></div>
            <div class="cell"><button class="grey-btn" onclick="addToDisplay('.')">.</button></div>
            <div class="cell"><button class="num-btn" onclick="addToDisplay('0')">0</button></div>
            <div class="cell"><button class="grey-btn" onclick="calculateResult()">=</button></div>
            <div class="cell"><button class="grey-btn" onclick="addToDisplay('+')">+</button></div>
        </div>
    </div>

    <script>
        let currentValue = "";

        function addToDisplay(value) {
            currentValue += value;
            document.getElementById("display").value = currentValue;
        }

        function clearDisplay() {
            currentValue = "";
            document.getElementById("display").value = "";
        }

        function calculateResult() {
            try {
                if (!currentValue) return;
                let expression = currentValue;

                // Pre-process percentages
                expression = expression.replace(/%/g, '/100');

                // Add implicit multiplication (e.g., "2sin(" becomes "2*sin(")
                expression = expression.replace(/(\d|\)|%)(?=\(|sin|cos|tan|ln|log|sqrt|exp|π|e)/g, "$1*");

                // Replace common symbols with JS operators
                expression = expression.replace(/×/g, '*');
                expression = expression.replace(/÷/g, '/');
                expression = expression.replace(/\^/g, '**');
                expression = expression.replace(/²/g, '**2');

                // Advanced functions mapping to JS Math object
                expression = expression.replace(/sin\(/g, 'Math.sin(');
                expression = expression.replace(/cos\(/g, 'Math.cos(');
                expression = expression.replace(/tan\(/g, 'Math.tan(');
                expression = expression.replace(/ln\(/g, 'Math.log('); // ln is log base e natively in JS Math
                expression = expression.replace(/log\(/g, 'Math.log10(');
                expression = expression.replace(/sqrt\(/g, 'Math.sqrt(');
                expression = expression.replace(/exp\(/g, 'Math.exp(');
                expression = expression.replace(/π/g, 'Math.PI');
                expression = expression.replace(/e/g, 'Math.E');

                // Auto-close missing parentheses before eval
                let openPAmount = (expression.match(/\(/g) || []).length;
                let closePAmount = (expression.match(/\)/g) || []).length;
                while (openPAmount > closePAmount) {
                    expression += ')';
                    closePAmount++;
                }

                let result = eval(expression);

                // Correct JavaScript floating point precision inaccuracies (e.g. 0.1 + 0.2 rendering as 0.30000000000000004)
                if (Number.isFinite(result)) {
                    result = Math.round(result * 10000000000) / 10000000000;
                }

                currentValue = result.toString();
                document.getElementById("display").value = currentValue;
            } catch (error) {
                document.getElementById("display").value = "Erreur";
                currentValue = "";
            }
        }
    </script>
</body>

</html>
