<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>
<body>
    <h1>Calculateur d'IMC</h1>
    Poids (kg): <input type="number" name="poids" id="poids"><br><br>
    Taille (m): <input type="number" name="taille" id="taille"><br><br>
    <button onclick="calculerIMC()">Calculer</button><br>
    <p id="res"></p>

    <script>
        function calculerIMC(){
            let poids = Number(document.getElementById("poids").value)
            let taille = Number(document.getElementById("taille").value)
            let imc = poids / (taille * taille);
            let res;
            //utilisant switch
            switch (true) {
                case imc < 18.5:
                    res = "Insuffisance pondérale (maigreur)"
                    break;
                case imc >= 18.5 && imc < 25:
                    res = "Corpulence normale"
                    break;
                case imc >= 25 && imc < 30:
                    res = "Surpoids"
                    break;
                case imc >= 30 && imc < 35:
                    res = "Obésité modérée"
                    break;
                case imc >= 35 && imc < 40:
                    res = "Obésité sévère"
                    break;
                case imc >= 40:
                    res = "Obésité morbide ou massive"
                    break;
                default:
                    res = "Valeur invalide"
                    break;
            }
            document.getElementById("res").innerHTML = "IMC: " + imc.toFixed(2) + " - " + res
        }
    </script>
</body>
</html>
