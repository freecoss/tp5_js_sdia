<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>
<body>
    <input type="number" name="num1" id="num1"><br><br>
    <input type="number" name="num2" id="num2"><br><br>
    <button id="+" onclick="calculate(this)">+</button>
    <button id="-" onclick="calculate(this)">-</button>
    <button id="*" onclick="calculate(this)">*</button>
    <button id="/" onclick="calculate(this)">/</button><br><br>
    <input type="text" name="res" id="res">

    <script>
        function calculate(elt){
            let res;
            operation = elt.id;
            num1 = Number(document.getElementById("num1").value)
            num2 = Number(document.getElementById("num2").value)
            switch (operation) {
                case "+":
                    res = num1+num2
                    break;
                case "-":
                    res = num1-num2
                    break;
                case "*":
                    res = num1*num2
                    break;
                case "/":
                    if (num2!=0){
                        res = num1/num2
                    }else{
                        res = "impossible de diviser sur 0"
                    }
                    break;
                default:
                    break;
            }
            document.getElementById("res").value = res
        }
    </script>
</body>
</html>
